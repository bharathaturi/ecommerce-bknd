# Server Configuration
server.port=8080
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}


# Database Configuration (Update with your credentials)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_key_which_should_be_long_enough_for_hmac_sha_256}
jwt.expiration=${JWT_EXPIRATION:86400000}

# App Configuration
app.razorpay.key_id=${RAZORPAY_KEY_ID:your_razorpay_key_id}
app.razorpay.key_secret=${RAZORPAY_KEY_SECRET:your_razorpay_key_secret}
